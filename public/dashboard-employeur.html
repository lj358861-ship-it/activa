<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace employeur — APRJ</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="aprjIntro" class="aprj-intro">
  <div class="aprj-intro-anneaux"><span></span><span></span><span></span><span></span></div>
  <div class="aprj-intro-lueur"></div>
  <img src="/logo-embleme.png" alt="Logo APRJ" class="aprj-intro-logo">
  <div class="aprj-intro-texte">
    <strong>APRJ</strong>
    <span>Tenons-nous ensemble pour construire un lendemain meilleur</span>
  </div>
</div>
<script>
(function(){
  var overlay = document.getElementById('aprjIntro');
  if (!overlay) return;
  if (sessionStorage.getItem('aprj_intro_vu')) {
    overlay.style.display = 'none';
    return;
  }
  sessionStorage.setItem('aprj_intro_vu', '1');
  setTimeout(function(){
    overlay.classList.add('aprj-intro-sortie');
    setTimeout(function(){ if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 700);
  }, 1500);
})();
</script>

<header class="entete">
  <div class="entete-bandeau">
    <a href="/" class="marque"><img src="/logo-embleme.png" alt="Logo APRJ" class="marque-logo"><span>APRJ<small>ESPACE EMPLOYEUR</small></span></a>
    <button class="bouton-burger" id="boutonBurger" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="entete-actions" id="menuMobile">
      <nav class="nav-liens"></nav>
      <a href="#" class="btn btn-contour-clair" onclick="deconnecter()">Se déconnecter</a>
    </div>
  </div>
</header>

<div class="conteneur tableau-bord">
  <div class="tb-entete">
    <h2 style="margin:0;">Mes demandes de recrutement</h2>
  </div>

  <button class="onglets-toggle" id="ongletsToggle" type="button" aria-expanded="false">
    <span id="ongletsToggleLabel">Nouvelle demande</span>
    <span class="onglets-toggle-icone">▾</span>
  </button>
  <div class="onglets" id="onglets">
    <div class="onglet actif" data-onglet="nouvelle">Nouvelle demande</div>
    <div class="onglet" data-onglet="liste">Mes demandes</div>
    <div class="onglet" data-onglet="propositions">Profils proposés</div>
  </div>

  <div id="vueNouvelle">
    <div id="zoneMessageDemande"></div>
    <form class="carte-formulaire" id="formDemande" style="max-width:720px; margin:0;">
      <div class="ligne-deux">
        <div class="champ">
          <label for="poste">Intitulé du poste *</label>
          <input type="text" id="poste" name="poste" required>
        </div>
        <div class="champ">
          <label for="nombre_postes">Nombre de postes</label>
          <input type="number" id="nombre_postes" name="nombre_postes" min="1" value="1">
        </div>
      </div>
      <div class="ligne-deux">
        <div class="champ">
          <label for="domaine">Domaine *</label>
          <select id="domaine" name="domaine" required>
            <option value="">Choisir...</option>
            <option>Informatique & Digital</option>
            <option>Finance & Comptabilité</option>
            <option>Marketing & Communication</option>
            <option>Ressources Humaines</option>
            <option>Commerce & Gestion</option>
            <option>Assurance & Banque</option>
            <option>Santé & Paramédical</option>
            <option>Autres domaines</option>
          </select>
        </div>
        <div class="champ">
          <label for="niveau_etude_requis">Niveau d'étude requis *</label>
          <select id="niveau_etude_requis" name="niveau_etude_requis" required>
            <option value="">Choisir...</option>
            <option>CEP</option><option>BEPC</option><option>Probatoire</option>
            <option>Baccalauréat</option><option>BTS</option><option>Licence</option>
            <option>Master</option><option>Doctorat</option>
          </select>
        </div>
      </div>
      <div class="champ">
        <label for="qualifications">Qualifications recherchées</label>
        <textarea id="qualifications" name="qualifications" rows="2"></textarea>
      </div>
      <div class="champ">
        <label for="description">Description du poste</label>
        <textarea id="description" name="description" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-or btn-large" id="btnDemande">Publier la demande</button>
    </form>
  </div>

  <div id="vueListe" style="display:none;">
    <div id="listeDemandes"></div>
    <div id="resultatsRecherche" style="margin-top:28px;"></div>
  </div>

  <div id="vuePropositions" style="display:none;">
    <div id="listePropositions"></div>

    <!-- Modal de choix du créneau d'entretien -->
    <div id="modalCreneau" style="display:none; position:fixed; inset:0; background:rgba(11,20,38,0.55); z-index:999; align-items:center; justify-content:center; padding:20px;">
      <div class="carte-formulaire compact" style="max-width:420px; width:100%;">
        <h3 style="margin-bottom:6px;">Choisir un créneau d'entretien</h3>
        <p style="font-size:0.85rem; color:var(--ardoise-douce); margin-bottom:18px;">
          Ces informations seront transmises au candidat par WhatsApp par l'équipe APRJ.
        </p>
        <div class="champ">
          <label for="creneauDate">Date *</label>
          <input type="date" id="creneauDate" required>
        </div>
        <div class="champ">
          <label for="creneauHeure">Heure *</label>
          <input type="time" id="creneauHeure" required>
        </div>
        <div class="champ">
          <label for="creneauLieu">Lieu (adresse, agence, lien visio...)</label>
          <input type="text" id="creneauLieu" placeholder="Ex : Siège APRJ, Akwa, Douala">
        </div>
        <div class="champ">
          <label for="creneauNotes">Informations complémentaires</label>
          <textarea id="creneauNotes" rows="3" placeholder="Ex : Prévoir une pièce d'identité, demander M. Etoundi à l'accueil..."></textarea>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button type="button" class="btn btn-contour" style="flex:1;" onclick="fermerModalCreneau()">Annuler</button>
          <button type="button" class="btn btn-or" style="flex:1;" id="btnConfirmerCreneau" onclick="confirmerSelectionAvecCreneau()">Confirmer la sélection</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/commun.js"></script>
<script>
exigerRole('employeur');

const boutonOngletsToggle = document.getElementById('ongletsToggle');
const conteneurOnglets = document.getElementById('onglets');
const libelleOngletsToggle = document.getElementById('ongletsToggleLabel');

boutonOngletsToggle.addEventListener('click', () => {
  const ouvert = conteneurOnglets.classList.toggle('onglets-ouvert');
  boutonOngletsToggle.setAttribute('aria-expanded', ouvert ? 'true' : 'false');
});

document.querySelectorAll('.onglet').forEach((o) => {
  o.addEventListener('click', () => {
    document.querySelectorAll('.onglet').forEach((x) => x.classList.remove('actif'));
    o.classList.add('actif');
    libelleOngletsToggle.textContent = o.textContent;
    conteneurOnglets.classList.remove('onglets-ouvert');
    boutonOngletsToggle.setAttribute('aria-expanded', 'false');
    const cible = o.dataset.onglet;
    document.getElementById('vueNouvelle').style.display = cible === 'nouvelle' ? 'block' : 'none';
    document.getElementById('vueListe').style.display = cible === 'liste' ? 'block' : 'none';
    document.getElementById('vuePropositions').style.display = cible === 'propositions' ? 'block' : 'none';
    if (cible === 'liste') chargerDemandes();
    if (cible === 'propositions') chargerPropositions();
  });
});

document.getElementById('formDemande').addEventListener('submit', async (e) => {
  e.preventDefault();
  const zone = document.getElementById('zoneMessageDemande');
  const bouton = document.getElementById('btnDemande');
  bouton.disabled = true;
  const donnees = Object.fromEntries(new FormData(e.target).entries());
  try {
    await appelApi('/employeurs/demandes', { method: 'POST', corpsJson: donnees });
    afficherMessage(zone, 'Demande publiée avec succès.', 'succes');
    e.target.reset();
  } catch (err) {
    afficherMessage(zone, err.message, 'erreur');
  } finally {
    bouton.disabled = false;
  }
});

async function chargerDemandes() {
  const conteneur = document.getElementById('listeDemandes');
  conteneur.innerHTML = '<p>Chargement...</p>';
  try {
    const { demandes } = await appelApi('/employeurs/demandes');
    if (!demandes.length) {
      conteneur.innerHTML = '<p>Aucune demande publiée pour le moment.</p>';
      return;
    }
    conteneur.innerHTML = `
      <table class="liste">
        <thead><tr><th>Poste</th><th>Domaine</th><th>Niveau requis</th><th>Statut</th><th>Publiée le</th><th></th></tr></thead>
        <tbody>
          ${demandes.map((d) => `
            <tr>
              <td>${d.poste}</td>
              <td>${d.domaine}</td>
              <td>${d.niveau_etude_requis}</td>
              <td><span class="etiquette etiquette-valide">${d.statut}</span></td>
              <td>${new Date(d.created_at).toLocaleDateString('fr-FR')}</td>
              <td>
                <button class="btn btn-marine" onclick="rechercher(${d.id})">Faire une recherche</button>
                <button class="btn btn-danger" onclick="supprimerDemande(${d.id})">Supprimer</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    conteneur.innerHTML = `<div class="message message-erreur">${err.message}</div>`;
  }
}

async function rechercher(demandeId) {
  const conteneur = document.getElementById('resultatsRecherche');
  conteneur.innerHTML = '<p>Recherche des profils correspondants...</p>';
  try {
    const { demande, resultats } = await appelApi(`/recherche/demandes/${demandeId}/candidats`);
    if (!resultats.length) {
      conteneur.innerHTML = `<div class="message message-attente">Aucun profil ne correspond encore à "${demande.poste}". Nouvelle recherche possible dès que de nouveaux candidats s'inscrivent.</div>`;
      return;
    }
    conteneur.innerHTML = `
      <h3>Profils correspondants pour "${demande.poste}"</h3>
      <table class="liste">
        <thead><tr><th></th><th>Candidat</th><th>Ville</th><th>Niveau</th><th>Atouts</th><th>Correspondance</th><th>CV</th></tr></thead>
        <tbody>
          ${resultats.map((c) => `
            <tr>
              <td>${c.photo_path ? `<img class="miniature" src="/uploads/${c.photo_path}">` : ''}</td>
              <td>${c.nom_complet}</td>
              <td>${c.ville || '—'}</td>
              <td>${c.niveau_etude}</td>
              <td>${c.atouts || '—'}</td>
              <td><span class="etiquette etiquette-score">${c.score_correspondance}%</span></td>
              <td>${c.cv_path ? `<a href="/uploads/${c.cv_path}" target="_blank">Voir le CV</a>` : '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    conteneur.innerHTML = `<div class="message message-erreur">${err.message}</div>`;
  }
}

async function supprimerDemande(id) {
  if (!confirm('Supprimer cette demande ?')) return;
  try {
    await appelApi(`/employeurs/demandes/${id}`, { method: 'DELETE' });
    chargerDemandes();
  } catch (err) { alert(err.message); }
}

async function chargerPropositions() {
  const conteneur = document.getElementById('listePropositions');
  conteneur.innerHTML = '<p>Chargement...</p>';
  try {
    const { propositions } = await appelApi('/employeurs/propositions');
    if (!propositions.length) {
      conteneur.innerHTML = '<p>Aucun profil proposé par l\'APRJ pour le moment.</p>';
      return;
    }
    const parDemande = {};
    propositions.forEach((p) => {
      parDemande[p.demande_id] = parDemande[p.demande_id] || { poste: p.poste, profils: [] };
      parDemande[p.demande_id].profils.push(p);
    });

    conteneur.innerHTML = Object.values(parDemande).map((groupe) => `
      <h3 style="margin-bottom:10px;">Poste : ${groupe.poste}</h3>
      ${groupe.profils.map((p) => `
        <div class="carte carte-proposition">
          ${p.photo_path
            ? `<img src="/uploads/${p.photo_path}" class="proposition-photo">`
            : `<div class="carte-icone proposition-photo" style="font-size:2rem;">👤</div>`}
          <div class="proposition-infos">
            <p style="margin:0 0 4px;"><strong>${p.nom_complet}</strong> — ${p.ville || '—'} — ${p.niveau_etude} (${p.domaine})</p>
            ${p.parcours_professionnel ? `<p style="margin:0 0 4px;">${p.parcours_professionnel}</p>` : ''}
            ${p.atouts ? `<p style="margin:0 0 4px;"><em>Atouts : ${p.atouts}</em></p>` : ''}
            <p style="margin:0 0 4px;">Correspondance : <span class="etiquette etiquette-score">${p.score_correspondance}%</span></p>
            ${p.cv_path ? `<a href="/uploads/${p.cv_path}" target="_blank">Voir le CV</a>` : ''}
          </div>
          <div class="proposition-action">
            ${p.statut === 'propose'
              ? `<button class="btn btn-or" onclick="selectionnerProfil(${p.id}, this)">Sélectionner ce profil</button>`
              : p.statut === 'selectionne'
                ? `<span class="etiquette etiquette-attente">Sélectionné — notification en cours</span>`
                : `<span class="etiquette etiquette-valide">Candidat notifié</span>`}
          </div>
        </div>
      `).join('')}
    `).join('<hr style="margin:22px 0; border:none; border-top:1px solid var(--bordure);">');
  } catch (err) {
    conteneur.innerHTML = `<div class="message message-erreur">${err.message}</div>`;
  }
}

let miseEnRelationEnCours = null;

// Ouvre le modal pour choisir le créneau d'entretien avant de confirmer la sélection
function selectionnerProfil(id, bouton) {
  miseEnRelationEnCours = { id, bouton };
  document.getElementById('creneauDate').value = '';
  document.getElementById('creneauHeure').value = '';
  document.getElementById('creneauLieu').value = '';
  document.getElementById('creneauNotes').value = '';
  document.getElementById('modalCreneau').style.display = 'flex';
}

function fermerModalCreneau() {
  document.getElementById('modalCreneau').style.display = 'none';
  miseEnRelationEnCours = null;
}

async function confirmerSelectionAvecCreneau() {
  if (!miseEnRelationEnCours) return;
  const { id, bouton } = miseEnRelationEnCours;

  const date = document.getElementById('creneauDate').value;
  const heure = document.getElementById('creneauHeure').value;
  const entretien_lieu = document.getElementById('creneauLieu').value.trim();
  const entretien_notes = document.getElementById('creneauNotes').value.trim();

  if (!date || !heure) {
    alert('Merci de choisir une date ET une heure d\'entretien.');
    return;
  }
  const entretien_date = `${date}T${heure}`;

  const btnConfirmer = document.getElementById('btnConfirmerCreneau');
  btnConfirmer.disabled = true;
  btnConfirmer.textContent = 'Envoi...';

  try {
    await appelApi(`/employeurs/mises-en-relation/${id}/selectionner`, {
      method: 'PUT',
      corpsJson: { entretien_date, entretien_lieu, entretien_notes }
    });
    fermerModalCreneau();
    chargerPropositions();
  } catch (err) {
    alert(err.message);
  } finally {
    btnConfirmer.disabled = false;
    btnConfirmer.textContent = 'Confirmer la sélection';
  }
}
</script>
</body>
</html>
