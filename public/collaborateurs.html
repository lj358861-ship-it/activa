<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos collaborateurs — APRJ</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="aprjIntro" class="aprj-intro">
  <div class="aprj-intro-anneau"></div>
  <img src="/logo-embleme.png" alt="Logo APRJ" class="aprj-intro-logo">
  <div class="aprj-intro-texte">
    <strong>APRJ</strong>
    <span>Ensemble pour demain</span>
  </div>
</div>
<script>
(function(){
  var overlay = document.getElementById('aprjIntro');
  if (!overlay) return;
  if (sessionStorage.getItem('aprj_intro_vu')) {
    overlay.style.display = 'none';
    return;
  }
  sessionStorage.setItem('aprj_intro_vu', '1');
  setTimeout(function(){
    overlay.classList.add('aprj-intro-sortie');
    setTimeout(function(){ if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 700);
  }, 1500);
})();
</script>

<header class="entete">
  <div class="entete-bandeau">
    <a href="/" class="marque"><img src="/logo-embleme.png" alt="Logo APRJ" class="marque-logo"><span>APRJ<small>ENSEMBLE POUR DEMAIN</small></span></a>
    <button class="bouton-burger" id="boutonBurger" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="entete-actions" id="menuMobile">
      <nav class="nav-liens">
      <a href="/services.html">Services & activités</a>
      <a href="/collaborateurs.html">Collaborateurs</a>
      <a href="/contact.html">Contact</a>
      <a href="/connexion.html">Se connecter</a>
    </nav>
      <a href="/inscription-candidat.html" class="btn btn-or">Créer un compte</a>
    </div>
  </div>
</header>

<div class="carrousel-hero" id="carrouselCollab"></div>

<section class="section">
  <div class="conteneur">
    <div class="section-titre">
      <h2>Nos collaborateurs</h2>
      <p>L'équipe qui accompagne les candidats et les entreprises au quotidien.</p>
    </div>
    <div class="grille-collaborateurs" id="listeCollaborateurs">
      <div class="squelette" style="height:220px;"></div><div class="squelette" style="height:220px;"></div><div class="squelette" style="height:220px;"></div>
    </div>
  </div>
</section>

<footer class="pied"><div class="conteneur">&copy; 2026 Association A.P.R.J. — Ensemble pour demain.</div></footer>

<script src="/js/commun.js"></script>
<script src="/js/carrousel.js"></script>
<script>
initCarrousel('collaborateurs', 'carrouselCollab');

(async () => {
  const conteneur = document.getElementById('listeCollaborateurs');
  try {
    const { collaborateurs } = await appelApi('/collaborateurs');
    if (!collaborateurs.length) { conteneur.innerHTML = '<p style="text-align:center;">Contenu bientôt disponible.</p>'; return; }
    conteneur.innerHTML = collaborateurs.map((c) => `
      <div class="collab-carte reveal">
        <div class="collab-photo">
          ${c.photo_path ? `<img src="/uploads/${c.photo_path}" alt="${c.nom}">` : c.nom.charAt(0)}
        </div>
        <h3>${c.nom}</h3>
        ${c.poste ? `<div class="collab-poste">${c.poste}</div>` : ''}
        <p>${c.bio || ''}</p>
      </div>
    `).join('');
    window.reveler(conteneur);
  } catch (e) { conteneur.innerHTML = '<p style="text-align:center;">Contenu bientôt disponible.</p>'; }
})();
</script>
</body>
</html>
